<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow - Gestão de Tarefas</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #222;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #111;
        }

        .task-input {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .task-input input {
            padding: 10px;
            font-size: 16px;
            border: 2px solid #444;
            border-radius: 5px;
            background-color: #ffffff;
            color: #111111;
        }

        .task-input button {
            padding: 10px;
            background-color: #1f7a35;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }

        .task-input button:hover {
            background-color: #145523;
        }

        .task-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .task-list li {
            background-color: white;
            margin: 10px 0;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        .task-list li.completed {
            text-decoration: line-through;
            background-color: #cfe8d3;
        }

        .task-list button {
            margin-left: 5px;
            background-color: #c82333;
            color: white;
            border: none;
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 4px;
            font-weight: bold;
        }

        .task-list button:hover {
            background-color: #8f1722;
        }

        #feedback {
            text-align: center;
            margin-top: 10px;
            color: green;
            font-weight: bold;
            visibility: hidden;
        }
    </style>
</head>

<body>

    <h1>TaskFlow</h1>

    <div class="task-input">

        <input
            type="text"
            id="new-task"
            placeholder="Digite sua tarefa"
            aria-label="Campo para digitar nova tarefa"
            tabindex="0"
        >

        <button
            id="add-task"
            aria-label="Adicionar nova tarefa"
            tabindex="0"
        >
            Adicionar Tarefa
        </button>

    </div>

    <div id="feedback" aria-live="polite">
        Tarefa adicionada!
    </div>

    <ul class="task-list" id="task-list">
        <!-- tarefas -->
    </ul>

    <script>

        const taskInput = document.getElementById('new-task');
        const addTaskButton = document.getElementById('add-task');
        const taskList = document.getElementById('task-list');
        const feedback = document.getElementById('feedback');

        function addTask(taskText) {

            const taskItem = document.createElement('li');

            taskItem.innerHTML = `
                <span>${taskText}</span>

                <div>
                    <button
                        onclick="completeTask(this)"
                        aria-label="Marcar tarefa como concluída"
                        tabindex="0"
                    >
                        Concluir
                    </button>

                    <button
                        onclick="removeTask(this)"
                        aria-label="Excluir tarefa"
                        tabindex="0"
                    >
                        Excluir
                    </button>
                </div>
            `;

            taskList.appendChild(taskItem);

            feedback.style.visibility = 'visible';

            setTimeout(() => {
                feedback.style.visibility = 'hidden';
            }, 2000);
        }

        function completeTask(button) {
            const taskItem = button.parentElement.parentElement;
            taskItem.classList.toggle('completed');
        }

        function removeTask(button) {
            const taskItem = button.parentElement.parentElement;
            taskList.removeChild(taskItem);
        }

        addTaskButton.addEventListener('click', () => {

            const taskText = taskInput.value;

            if (taskText.trim() !== '') {

                addTask(taskText);

                taskInput.value = '';

                taskInput.focus();
            }
        });

        taskInput.addEventListener('keypress', (e) => {

            if (e.key === 'Enter') {
                addTaskButton.click();
            }
        });

        document.addEventListener('keydown', function(event) {

            if (event.ctrlKey && event.key === 'n') {

                event.preventDefault();

                taskInput.focus();
            }
        });

    </script>

</body>
</html>
